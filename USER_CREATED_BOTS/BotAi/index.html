        /* scrollbar – organic */
        .chat-window::-webkit-scrollbar {

        .chat-window::-webkit-scrollbar-track {

        .chat-window::-webkit-scrollbar-thumb {

        /* multiple overlays for extra chaos */
        .glitch-overlay {
            position: fixed;

        .noise-overlay {

<body>
    <!-- Multiple canvases for layered 3D -->
    <canvas id="bg-canvas"></canvas>
    <canvas id="fg-canvas"></canvas>
    <canvas id="glow-canvas"></canvas>

    <!-- Main chat container -->
    <div class="bot-container">
        <div class="bot-header">
            <div class="avatar">AI</div>
            <div class="title">
                <span>BOT AI</span>
                self-contained · logic.txt

    <!-- Your original script (unchanged) -->
    <script src="script.js"></script>

    <!-- MASSIVE IMMERSIVE EFFECTS SCRIPT -->
    <script>
        (function() {
            // ==================== CONFIGURATION ====================
            const fonts = [
                'Creepster', 'Eater', 'Nosifer', 'UnifrakturMaguntia', 'Butcherman',
                'Bloody', 'Berkshire Swash', 'Metal Mania', 'Rubik Glitch', 'Rubik Wet Paint',
                'Rubik Beastly', 'Rubik Burned', 'Rubik Dirt', 'Rubik Distressed', 'Rubik Gemstones',
                'Rubik Glitch Pop', 'Rubik Marker Hatch', 'Rubik Maze', 'Rubik Microbe', 'Rubik Moonrocks',
                'Rubik Pixels', 'Rubik Storm', 'Rubik Vinyl', 'Rubik Wreck', 'Sixtyfour',
                'Playfair Display SC', 'Courier New', 'Comic Sans MS', 'Impact', 'Wingdings'
            ]; // more than 20

            // ==================== THREE.JS: THREE CANVASES ====================
            // Canvas 1: Main background with water/earthquake
            const canvas1 = document.getElementById('bg-canvas');
            const scene1 = new THREE.Scene();
            scene1.background = new THREE.Color(0x050510);

            const camera1 = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera1.position.set(0, 3, 15);
            camera1.lookAt(0, 0, 0);

            const renderer1 = new THREE.WebGLRenderer({ canvas: canvas1, alpha: false, antialias: true });
            renderer1.setSize(window.innerWidth, window.innerHeight);
            renderer1.setPixelRatio(window.devicePixelRatio);
            renderer1.toneMapping = THREE.ReinhardToneMapping;
            renderer1.toneMappingExposure = 1.2;

            // Lights
            const ambient1 = new THREE.AmbientLight(0x404080);
            scene1.add(ambient1);
            const dirLight1 = new THREE.DirectionalLight(0xffaaff, 1.5);
            dirLight1.position.set(2, 3, 4);
            scene1.add(dirLight1);
            const pointLight1 = new THREE.PointLight(0xff00aa, 2, 20);
            pointLight1.position.set(-2, 1, 5);
            scene1.add(pointLight1);

            // Main chaotic plane (high resolution)
            const geo1 = new THREE.PlaneGeometry(24, 24, 256, 256);
            const mat1 = new THREE.MeshPhongMaterial({
                color: 0x330044,
                emissive: 0x220022,
                wireframe: false,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.7,
                shininess: 40,
                flatShading: false
            });
            const plane1 = new THREE.Mesh(geo1, mat1);
            plane1.rotation.x = -Math.PI / 3.2;
            plane1.position.y = -1.5;
            scene1.add(plane1);

            // Second plane with wireframe for distortion
            const geo2 = new THREE.PlaneGeometry(26, 26, 128, 128);
            const mat2 = new THREE.MeshPhongMaterial({
                color: 0x550066,
                emissive: 0x110022,
                wireframe: true,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const plane2 = new THREE.Mesh(geo2, mat2);
            plane2.rotation.x = -Math.PI / 3.2;
            plane2.position.y = -1.2;
            scene1.add(plane2);

            // Floating spheres (eyes?)
            const sphereGeo = new THREE.SphereGeometry(0.3, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ color: 0xff00aa, emissive: 0x440022 });
            const sphere1 = new THREE.Mesh(sphereGeo, sphereMat);
            sphere1.position.set(2, 0.5, -3);
            scene1.add(sphere1);
            const sphere2 = new THREE.Mesh(sphereGeo, sphereMat);
            sphere2.position.set(-2, 0.2, -4);
            scene1.add(sphere2);

            // Particles (chaos dust)
            const particleCount = 2000;
            const particlesGeo = new THREE.BufferGeometry();
            const posArray = new Float32Array(particleCount * 3);
            const colorArray = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                posArray[i*3] = (Math.random() - 0.5) * 40;
                posArray[i*3+1] = (Math.random() - 0.5) * 20;
                posArray[i*3+2] = (Math.random() - 0.5) * 40 - 5;
                colorArray[i*3] = Math.random() * 0.8 + 0.2; // r
                colorArray[i*3+1] = Math.random() * 0.3; // g
                colorArray[i*3+2] = Math.random() * 0.8 + 0.2; // b
            }
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particlesGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
            const particlesMat = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(particlesGeo, particlesMat);
            scene1.add(particles);

            // Store original Y for wave animation
            const positions1 = geo1.attributes.position.array;
            const count1 = positions1.length / 3;
            const originalY1 = new Float32Array(count1);
            for (let i = 0; i < count1; i++) {
                originalY1[i] = positions1[i*3+1];
            }

            // Animation variables
            let clock = new THREE.Clock();

            function animateScene1() {
                const delta = clock.getDelta();
                const elapsedTime = performance.now() / 1000;

                // Wave motion on plane1
                const positions = geo1.attributes.position.array;
                for (let i = 0; i < count1; i++) {
                    const x = positions[i*3];
                    const z = positions[i*3+2];
                    const wave1 = Math.sin(x * 2.0 + elapsedTime * 2) * Math.cos(z * 1.5 + elapsedTime * 1.5) * 0.5;
                    const wave2 = Math.sin(x * 5.0 + elapsedTime * 4) * 0.3;
                    const wave3 = Math.cos(z * 6.0 + elapsedTime * 3) * 0.2;
                    const shock = Math.sin(elapsedTime * 15) * Math.exp(-Math.abs(x)) * 0.5;
                    const quake = (Math.random() > 0.99) ? 1.0 : 0.0;
                    positions[i*3+1] = originalY1[i] + wave1 + wave2 + wave3 + shock + quake;
                }
                geo1.attributes.position.needsUpdate = true;

                // Rotate particles
                particles.rotation.y += 0.0005;
                particles.rotation.x += 0.0003;

                // Animate spheres
                sphere1.position.x = 2 + Math.sin(elapsedTime * 0.8) * 1.5;
                sphere1.position.y = 0.5 + Math.cos(elapsedTime * 1.2) * 0.5;
                sphere2.position.x = -2 + Math.sin(elapsedTime * 0.6 + 2) * 1.5;
                sphere2.position.y = 0.2 + Math.cos(elapsedTime * 1.0) * 0.7;

                // Camera drift
                camera1.position.x = Math.sin(elapsedTime * 0.15) * 2;
                camera1.position.y = 3 + Math.sin(elapsedTime * 0.2) * 0.5;
                camera1.lookAt(0, 0, 0);

                renderer1.render(scene1, camera1);
                requestAnimationFrame(animateScene1);
            }
            animateScene1();

            // ==================== CANVAS 2: FOREGROUND WITH BLOOM ====================
            const canvas2 = document.getElementById('fg-canvas');
            const scene2 = new THREE.Scene();
            const camera2 = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera2.position.set(0, 1, 10);
            camera2.lookAt(0, 0, 0);

            const renderer2 = new THREE.WebGLRenderer({ canvas: canvas2, alpha: true, antialias: true });
            renderer2.setSize(window.innerWidth, window.innerHeight);
            renderer2.setPixelRatio(window.devicePixelRatio);
            renderer2.setClearColor(0x000000, 0); // transparent

            // Add some floating geometric shapes
            const torusKnotGeo = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
            const torusKnotMat = new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0x330022, wireframe: true });
            const torusKnot = new THREE.Mesh(torusKnotGeo, torusKnotMat);
            torusKnot.position.set(0, 1, -2);
            scene2.add(torusKnot);

            const icosahedronGeo = new THREE.IcosahedronGeometry(0.8, 1);
            const icosahedronMat = new THREE.MeshPhongMaterial({ color: 0xaa44ff, emissive: 0x220033, shininess: 60 });
            const icosahedron = new THREE.Mesh(icosahedronGeo, icosahedronMat);
            icosahedron.position.set(2, -0.5, -3);
            scene2.add(icosahedron);

            // Light for scene2
            const light2 = new THREE.PointLight(0xff88ff, 1, 20);
            light2.position.set(1, 2, 3);
            scene2.add(light2);

            function animateScene2() {
                const elapsedTime = performance.now() / 1000;
                torusKnot.rotation.x += 0.01;
                torusKnot.rotation.y += 0.02;
                icosahedron.rotation.x += 0.005;
                icosahedron.rotation.y += 0.01;
                renderer2.render(scene2, camera2);
                requestAnimationFrame(animateScene2);
            }
            animateScene2();

            // ==================== CANVAS 3: POST-PROCESSING (GLOW/GLITCH) ====================
            const canvas3 = document.getElementById('glow-canvas');
            const scene3 = new THREE.Scene();
            const camera3 = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera3.position.set(0, 0, 5);
            camera3.lookAt(0, 0, 0);

            const renderer3 = new THREE.WebGLRenderer({ canvas: canvas3, alpha: true });
            renderer3.setSize(window.innerWidth, window.innerHeight);
            renderer3.setPixelRatio(window.devicePixelRatio);
            renderer3.setClearColor(0x000000, 0);

            // Simple glowing cube
            const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
            const cubeMat = new THREE.MeshStandardMaterial({ color: 0xff00aa, emissive: 0x550033 });
            const cube = new THREE.Mesh(cubeGeo, cubeMat);
            cube.position.set(1, 1, -1);
            scene3.add(cube);

            const sphere3Geo = new THREE.SphereGeometry(0.6, 32);
            const sphere3Mat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x002244 });
            const sphere3 = new THREE.Mesh(sphere3Geo, sphere3Mat);
            sphere3.position.set(-1, -0.5, -2);
            scene3.add(sphere3);

            // Lights
            const light3 = new THREE.PointLight(0xff88aa, 2, 10);
            light3.position.set(0, 2, 2);
            scene3.add(light3);

            // Post-processing setup
            const renderScene = new THREE.RenderPass(scene3, camera3);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.1;
            bloomPass.strength = 1.2;
            bloomPass.radius = 0.5;

            const glitchPass = new THREE.GlitchPass();
            glitchPass.goWild = true; // full chaos

            const composer = new THREE.EffectComposer(renderer3);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            composer.addPass(glitchPass);

            function animateScene3() {
                const elapsedTime = performance.now() / 1000;
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.02;
                sphere3.rotation.x += 0.005;
                sphere3.rotation.y += 0.01;

                // Randomly toggle glitch intensity
                if (Math.random() < 0.01) {
                    glitchPass.goWild = !glitchPass.goWild;
                }

                composer.render();
                requestAnimationFrame(animateScene3);
            }
            animateScene3();

            // ==================== FONT CHAOS ====================
            // Apply random fonts to all text elements periodically
            function applyRandomFonts() {
                const elements = document.querySelectorAll('.bubble, .title, .avatar, .avatar-small, #userInput, #sendBtn, .floating-text');
                elements.forEach(el => {
                    const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
                    el.style.fontFamily = `'${randomFont}', cursive`;
                });
            }
            setInterval(applyRandomFonts, 3000); // change fonts every 3 seconds

            // Also apply to new messages added by script.js (observe mutations)
            const chatWindow = document.getElementById('chatWindow');
            const observer = new MutationObserver(() => {
                // randomize fonts of new messages
                const newMessages = chatWindow.querySelectorAll('.message:not([data-font-chaos])');
                newMessages.forEach(msg => {
                    msg.setAttribute('data-font-chaos', 'true');
                    const bubble = msg.querySelector('.bubble');
                    if (bubble) {
                        bubble.style.fontFamily = `'${fonts[Math.floor(Math.random() * fonts.length)]}', cursive`;
                    }
                });
            });
            observer.observe(chatWindow, { childList: true, subtree: true });

            // ==================== GSAP CHAOS ====================
            // Periodic glitch on header
            function glitchHeader() {
                gsap.timeline({
                    repeat: 2,
                    yoyo: true,
                    ease: "steps(1)"
                })
                .to('.bot-header', { duration: 0.05, filter: 'blur(5px) hue-rotate(180deg)', x: 5 })
                .to('.bot-header', { duration: 0.05, filter: 'blur(0px) hue-rotate(0deg)', x: -5 })
                .to('.bot-header', { duration: 0.05, filter: 'invert(1) brightness(2)', x: 0 })
                .to('.bot-header', { duration: 0.05, filter: 'none', x: 0 });
            }
            setInterval(glitchHeader, 7000);

            // Shake container randomly
            function shakeContainer() {
                gsap.to('.bot-container', {
                    duration: 0.2,
                    x: -10,
                    y: 5,
                    rotation: 1,
                    repeat: 6,
                    yoyo: true,
                    ease: "power1.inOut",
                    onComplete: () => gsap.set('.bot-container', { x: 0, y: 0, rotation: 0 })
                });
            }
            setInterval(shakeContainer, 12000 + Math.random() * 8000);

            // Mouse interaction: slight rotation based on mouse position
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 10;
                const y = (e.clientY / window.innerHeight - 0.5) * 5;
                gsap.to('.bot-container', { duration: 0.5, rotationY: x, rotationX: -y, ease: "power2.out" });
            });

            // Input glitch on focus
            document.getElementById('userInput').addEventListener('focus', () => {
                gsap.to('#userInput', { duration: 0.2, scale: 1.05, boxShadow: '0 0 100px magenta', repeat: 3, yoyo: true });
            });

            // Send button chaos
            document.getElementById('sendBtn').addEventListener('click', () => {
                if (Math.random() > 0.5) shakeContainer();
                gsap.to('#sendBtn', { duration: 0.1, rotation: 15, scale: 1.3, repeat: 2, yoyo: true });
            });

            // ==================== AUDIO VISUALIZER (SIMULATED) ====================
            // Not actual audio, but we can create a fake spectrum analyzer with divs
            const audioBars = document.createElement('div');
            audioBars.style.position = 'fixed';
            audioBars.style.bottom = '0';
            audioBars.style.left = '0';
            audioBars.style.width = '100%';
            audioBars.style.height = '30px';
            audioBars.style.display = 'flex';
            audioBars.style.gap = '2px';
            audioBars.style.zIndex = '25';
            audioBars.style.pointerEvents = 'none';
            for (let i = 0; i < 50; i++) {
                const bar = document.createElement('div');
                bar.style.flex = '1';
                bar.style.background = 'rgba(255,0,255,0.3)';
                bar.style.height = '5px';
                bar.style.transition = 'height 0.1s';
                audioBars.appendChild(bar);
            }
            document.body.appendChild(audioBars);

            function animateAudioBars() {
                const bars = audioBars.children;
                for (let i = 0; i < bars.length; i++) {
                    const h = Math.random() * 60;
                    bars[i].style.height = h + 'px';
                    bars[i].style.background = `rgba(255, ${Math.floor(Math.random()*200)}, 255, 0.8)`;
                }
                requestAnimationFrame(animateAudioBars);
            }
            animateAudioBars();

            // ==================== RESIZE HANDLER ====================
            window.addEventListener('resize', () => {
                camera1.aspect = window.innerWidth / window.innerHeight;
                camera1.updateProjectionMatrix();
                renderer1.setSize(window.innerWidth, window.innerHeight);

                camera2.aspect = window.innerWidth / window.innerHeight;
                camera2.updateProjectionMatrix();
                renderer2.setSize(window.innerWidth, window.innerHeight);

                camera3.aspect = window.innerWidth / window.innerHeight;
                camera3.updateProjectionMatrix();
                renderer3.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });

            // ==================== FINAL TOUCH: RANDOM CSS VARIABLES ====================
            setInterval(() => {
                document.body.style.setProperty('--chaos-hue', Math.random() * 360);
            }, 500);
        })();
    </script>
</body>
</html>
